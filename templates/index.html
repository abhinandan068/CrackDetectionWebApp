<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI Crack Detection</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .main-container{
            margin-top:50px;
            margin-bottom:50px;
        }

        .card-box{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .title{
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            color:gray;
            margin-bottom:30px;
        }

        .upload-box{
            border:2px dashed #cfd8dc;
            border-radius:15px;
            padding:30px;
            background:#fafafa;
        }

        .preview-image{
            width:100%;
            border-radius:15px;
            margin-top:20px;
        }

        .result-box{
            margin-top:30px;
            padding:25px;
            border-radius:15px;
            background:#f8f9fa;
        }

        .status-crack{
            color:#dc3545;
            font-weight:bold;
        }

        .status-safe{
            color:#198754;
            font-weight:bold;
        }

        .metric{
            font-size:18px;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<div class="container main-container">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card-box">

                <div class="text-center">

                    <h1 class="title">
                        AI Crack Detection
                    </h1>

                    <p class="subtitle">
                        Upload a concrete surface image for AI analysis
                    </p>

                </div>

                <form
                    action="/predict"
                    method="POST"
                    enctype="multipart/form-data"
                >

                    <div class="upload-box">

                        <div class="mb-3">

                            <label class="form-label">
                                Select Image
                            </label>

                            <input
                                type="file"
                                name="image"
                                class="form-control"
                                accept="image/*"
                                required
                            >

                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-primary btn-lg"
                            >
                                Analyze Image
                            </button>

                        </div>

                    </div>

                </form>

                {% if result %}

                <div class="result-box">

                    <h3>
                        Prediction Result
                    </h3>

                    <hr>

                    <div class="metric">

                        <strong>Status:</strong>

                        {% if result == "Crack Detected" %}

                            <span class="status-crack">
                                Crack Detected
                            </span>

                        {% else %}

                            <span class="status-safe">
                                No Crack
                            </span>

                        {% endif %}

                    </div>

                    <div class="metric">

                        <strong>Confidence:</strong>
                        {{ confidence }}%

                    </div>

                    <div class="metric">

                        <strong>Severity:</strong>
                        {{ severity }}

                    </div>

                    <div class="metric">

                        <strong>Crack Ratio:</strong>
                        {{ crack_ratio }}

                    </div>

                    <img
                        src="{{ image_path }}"
                        class="preview-image"
                    >

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</div>

</body>

</html>
